[package]
name = "bund_blobstore"
version = "0.1.0"
edition = "2024"
description = "Basic support for storing compiled BUND bytecode into an external file"
license-file = "LICENSE"
repository = "https://github.com/vulogov/bund_blobstore"
categories = ["data-structures"]
keywords = ["value", "bund", "data", "blob"]

[dependencies]
easy-error = "1.0.*"
env_logger = "0.11.*"
log = "0.4.*"
rust_dynamic = "0.*.*"
bincode = "1.3"
redb = "3.1.1"
tempfile = "3.27.0"
serde = { version = "1.0", features = ["derive"] }
